<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student - Bus Tracking System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="interface-container">
        <div class="interface-header">
            <h1>🎓 Student Portal</h1>
            <button class="btn btn-secondary" onclick="logout()">Logout</button>
        </div>

        <!-- Login Section -->
        <div id="loginSection" class="auth-section">
            <h2>Student Login</h2>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="loginEmail" placeholder="student@college.edu">
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="loginPassword" placeholder="Enter password">
            </div>
            <button class="btn btn-primary" onclick="login()">Login</button>
            <p style="margin-top: 15px;">Don't have an account? <a href="#" onclick="showRegister()">Register</a></p>
        </div>

        <!-- Register Section -->
        <div id="registerSection" class="auth-section hidden">
            <h2>Student Registration</h2>
            <div class="form-group">
                <label>User ID:</label>
                <input type="text" id="regUserId" placeholder="STU001">
            </div>
            <div class="form-group">
                <label>Name:</label>
                <input type="text" id="regName" placeholder="Student Name">
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="regEmail" placeholder="student@college.edu">
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="regPassword" placeholder="Enter password">
            </div>
            <div class="form-group">
                <label>Contact:</label>
                <input type="text" id="regContact" placeholder="+1234567890">
            </div>
            <div class="form-group">
                <label>Address:</label>
                <input type="text" id="regAddress" placeholder="Your address">
            </div>
            <button class="btn btn-primary" onclick="register()">Register</button>
            <p style="margin-top: 15px;">Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
        </div>

        <!-- Student Dashboard -->
        <div id="dashboardSection" class="hidden">
            <div class="section">
                <h2>My Route Information</h2>
                <div id="routeInfo"></div>
                <button class="btn btn-primary" onclick="refreshTracking()" style="margin-top: 20px;">Refresh Tracking</button>
            </div>
        </div>

        <div id="message"></div>
    </div>

    <script src="student.js"></script>
</body>
</html>
