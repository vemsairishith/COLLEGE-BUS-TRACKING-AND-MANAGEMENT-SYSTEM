<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver - Bus Tracking System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="interface-container">
        <div class="interface-header">
            <h1>🚗 Driver Portal</h1>
            <button class="btn btn-secondary" onclick="logout()">Logout</button>
        </div>

        <!-- Login Section -->
        <div id="loginSection" class="auth-section">
            <h2>Driver Login</h2>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="loginEmail" placeholder="driver@college.edu">
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="loginPassword" placeholder="Enter password">
            </div>
            <button class="btn btn-primary" onclick="login()">Login</button>
            <p style="margin-top: 15px;">Don't have an account? <a href="#" onclick="showRegister()">Register</a></p>
        </div>

        <!-- Register Section -->
        <div id="registerSection" class="auth-section hidden">
            <h2>Driver Registration</h2>
            <div class="form-group">
                <label>User ID:</label>
                <input type="text" id="regUserId" placeholder="DRV001">
            </div>
            <div class="form-group">
                <label>Name:</label>
                <input type="text" id="regName" placeholder="Driver Name">
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="regEmail" placeholder="driver@college.edu">
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="regPassword" placeholder="Enter password">
            </div>
            <div class="form-group">
                <label>Contact:</label>
                <input type="text" id="regContact" placeholder="+1234567890">
            </div>
            <button class="btn btn-primary" onclick="register()">Register</button>
            <p style="margin-top: 15px;">Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
        </div>

        <!-- Driver Dashboard -->
        <div id="dashboardSection" class="hidden">
            <div class="section">
                <h2>My Assigned Route</h2>
                <div id="routeInfo"></div>
            </div>

            <div class="section">
                <h2>Update Trip Status</h2>
                <div class="form-group">
                    <label>Current Stop:</label>
                    <select id="currentStop">
                        <option value="">Select Stop</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Bus Status:</label>
                    <select id="busStatus">
                        <option value="Active">Active</option>
                        <option value="Running">Running</option>
                        <option value="Delayed">Delayed</option>
                        <option value="Reached Destination">Reached Destination</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="updateStatus()">Update Status</button>
            </div>
        </div>

        <div id="message"></div>
    </div>

    <script src="driver.js"></script>
</body>
</html>
